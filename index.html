<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main">
     <h1>Expense Tracker</h1>
     <div class="input-expence">
       <input type="text" placeholder="Expence" class="ex-name">
       <input type="number" name="" id="" placeholder="Enter amount" class="ex-amount">
       <button class="add-btn">ADD-EXPENCE</button>
     </div>
     <div class="list-box"> 
        <ul class="main-list">
            <li>
            <span class="ex-row">
               <p class="p1">food</p>

              <span class="action-div">
                <p class="p2">600</p>
                <button class="del-btn">delete</button>
                <button class="edit-btn">edit</button>
              </span>
             </span>
        </li>
        </ul>
     </div>
     <div class="total-div">
        <h3>Total-Spend</h3>
        <p id="total-amount">0</p>
     </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
