<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <main class="main-panel">
            <h1>Expense Tracker</h1>
            
            <div class="input-expense">
                <div class="input-group">
                    <label for="ex-name">Expense Title</label>
                    <input type="text" id="ex-name" placeholder="e.g., Grocery" class="ex-name">
                </div>

                <div class="input-group">
                    <label for="ex-amount">Amount (&#8377;)</label>
                    <input type="number" id="ex-amount" placeholder="e.g., 500" class="ex-amount">
                </div>

                <div class="input-group">
                    <label for="ex-category">Category</label>
                    <select id="ex-category">
                        <option value="All">All Transactions (Filter view)</option>
                        <option value="Food">Food</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Transport">Transport</option>
                        <option value="Rent">Rent</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Subscription">Subscription</option>
                        <option value="Miscellaneous">Miscellaneous</option>
                    </select>
                </div>
            </div> 
            
            <div class="action-buttons">
                <button class="add-btn">Add Expense</button>
                <button class="search-btn">Filter Category</button>
            </div>

            <div class="list-box"> 
                <ul class="main-list">
                  
                </ul>
            </div>

            <div class="total-div">
                <h3>Total Spend:</h3>
                <p id="total-amount">&#8377; 0.00</p>
            </div>
        </main>

        <section class="chart-panel">
            <h3>Visual Breakdown</h3>
            <div class="chart-container">
                <canvas id="expenseChart"></canvas>
            </div>
        </section>
    </div>

    <!-- ChartJS and App Execution -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
